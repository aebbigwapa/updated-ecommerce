<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Grande — My Orders</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/shop.css') }}">
    <style>
        body { background:#f8f9fa; }

        /* ── Filter tabs ── */
        .ord-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:20px; }
        .ord-tab {
            padding:6px 14px; border-radius:20px; font-size:12px; font-weight:600;
            border:1.5px solid #e8e8f0; background:#fff; color:#6c757d;
            cursor:pointer; transition:all .2s; white-space:nowrap;
        }
        .ord-tab:hover { border-color:#FF2BAC; color:#FF2BAC; }
        .ord-tab.active { background:linear-gradient(135deg,#FF2BAC,#FF6BCE); border-color:transparent; color:#fff; }

        /* ── Order card ── */
        .ord-card {
            background:#fff; border-radius:14px; border:1px solid #e8e8f0;
            margin-bottom:14px; overflow:hidden; transition:box-shadow .2s;
        }
        .ord-card:hover { box-shadow:0 4px 20px rgba(0,0,0,.08); }
        .ord-header {
            display:flex; justify-content:space-between; align-items:center;
            padding:14px 18px; border-bottom:1px solid #f0f0f8; flex-wrap:wrap; gap:8px;
        }
        .ord-id { font-size:13px; font-weight:700; color:#1a1a3e; }
        .ord-date { font-size:11px; color:#adb5bd; margin-top:2px; }
        .ord-badge {
            font-size:11px; font-weight:700; padding:4px 12px; border-radius:20px;
            text-transform:uppercase; letter-spacing:.4px;
        }
        .badge-pending       { background:#fff3cd; color:#856404; }
        .badge-processing    { background:#cff4fc; color:#055160; }
        .badge-ready_for_pickup { background:#d1ecf1; color:#0c5460; }
        .badge-in_transit    { background:#e2d9f3; color:#432874; }
        .badge-delivered     { background:#d1e7dd; color:#0a3622; }
        .badge-cancelled     { background:#f8d7da; color:#842029; }

        /* ── Order body ── */
        .ord-body { padding:14px 18px; }
        .ord-item-row {
            display:flex; align-items:center; gap:10px;
            padding:6px 0; border-bottom:1px solid #f8f9fa; font-size:13px;
        }
        .ord-item-row:last-child { border-bottom:none; }
        .ord-item-name { flex:1; color:#1a1a3e; font-weight:500; }
        .ord-item-qty  { color:#adb5bd; font-size:12px; }
        .ord-item-price { color:#FF2BAC; font-weight:600; font-size:13px; }
        .ord-color-dot { width:10px; height:10px; border-radius:50%; border:1px solid #e8e8f0; flex-shrink:0; }

        /* ── Order footer ── */
        .ord-footer {
            display:flex; justify-content:space-between; align-items:center;
            padding:12px 18px; background:#fafafa; border-top:1px solid #f0f0f8;
            flex-wrap:wrap; gap:8px;
        }
        .ord-total { font-size:15px; font-weight:700; color:#1a1a3e; }
        .ord-total span { color:#FF2BAC; }
        .ord-actions { display:flex; gap:8px; align-items:center; }
        .ord-btn-view {
            padding:7px 16px; border-radius:8px; font-size:12px; font-weight:600;
            background:linear-gradient(135deg,#FF2BAC,#FF6BCE); color:#fff;
            text-decoration:none; border:none; cursor:pointer; transition:all .2s;
        }
        .ord-btn-view:hover { box-shadow:0 4px 12px rgba(255,43,172,.3); color:#fff; transform:translateY(-1px); }
        .ord-btn-cancel {
            padding:7px 14px; border-radius:8px; font-size:12px; font-weight:600;
            background:#fff; color:#e74c3c; border:1.5px solid #e74c3c; cursor:pointer; transition:all .2s;
        }
        .ord-btn-cancel:hover { background:#e74c3c; color:#fff; }

        /* ── Progress bar ── */
        .ord-progress { padding:10px 18px 14px; }
        .ord-progress-track {
            display:flex; align-items:center; position:relative;
        }
        .ord-progress-track::before {
            content:''; position:absolute; top:10px; left:10px; right:10px;
            height:2px; background:#e8e8f0; z-index:0;
        }
        .ord-step { display:flex; flex-direction:column; align-items:center; flex:1; position:relative; z-index:1; }
        .ord-step-dot {
            width:20px; height:20px; border-radius:50%; border:2px solid #e8e8f0;
            background:#fff; display:flex; align-items:center; justify-content:center;
            font-size:9px; font-weight:700; color:#adb5bd; transition:all .3s;
        }
        .ord-step.done .ord-step-dot  { background:#10b981; border-color:#10b981; color:#fff; }
        .ord-step.active .ord-step-dot { background:#FF2BAC; border-color:#FF2BAC; color:#fff; box-shadow:0 0 0 3px rgba(255,43,172,.2); }
        .ord-step-label { font-size:9px; color:#adb5bd; margin-top:4px; text-align:center; line-height:1.2; }
        .ord-step.done .ord-step-label  { color:#10b981; }
        .ord-step.active .ord-step-label { color:#FF2BAC; font-weight:600; }

        /* ── Skeleton ── */
        .skel { background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:8px; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        /* ── Empty ── */
        .ord-empty { text-align:center; padding:60px 20px; }
        .ord-empty-icon { font-size:56px; margin-bottom:16px; }
        .ord-empty h5 { font-family:'Playfair Display',serif; color:#1a1a3e; margin-bottom:8px; }
        .ord-empty p  { color:#adb5bd; font-size:14px; margin-bottom:20px; }

        @media(max-width:576px) {
            .ord-header, .ord-footer { flex-direction:column; align-items:flex-start; }
            .ord-actions { width:100%; }
            .ord-btn-view, .ord-btn-cancel { flex:1; text-align:center; }
        }
    </style>
</head>
<body>

{% from 'buyer/_navbar.html' import grande_navbar %}
{{ grande_navbar(user=session.get('user'), active='orders') }}

<div class="container py-4">
    <nav class="shop-breadcrumb">
        <a href="/buyer/dashboard">Home</a> / <span>My Orders</span>
    </nav>

    <div class="row g-4">

        <!-- Sidebar -->
        <div class="col-12 col-md-3">
            <div class="settings-card mb-3">
                <div style="font-size:10px;font-weight:700;color:#adb5bd;text-transform:uppercase;letter-spacing:.8px;padding:0 4px 8px">Account</div>
                <div class="settings-nav d-flex flex-column gap-1">
                    <a href="/buyer/orders"       class="nav-link active"><span class="icon">📦</span> My Orders</a>
                    <a href="/buyer/address_book" class="nav-link"><span class="icon">📍</span> Addresses</a>
                </div>
            </div>
            <div class="settings-card">
                <div style="font-size:10px;font-weight:700;color:#adb5bd;text-transform:uppercase;letter-spacing:.8px;padding:0 4px 8px">Settings</div>
                <div class="settings-nav d-flex flex-column gap-1">
                    <a href="/buyer/settings"                 class="nav-link"><span class="icon">👤</span> Profile</a>
                    <a href="/buyer/settings#sectionPassword" class="nav-link"><span class="icon">🔑</span> Password</a>
                    <a href="/buyer/settings#sectionNotif"    class="nav-link"><span class="icon">🔔</span> Notifications</a>
                    <a href="/buyer/settings#sectionSecurity" class="nav-link"><span class="icon">🛡️</span> Security</a>
                </div>
            </div>
        </div>

        <!-- Main -->
        <div class="col-12 col-md-9">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 style="font-family:'Playfair Display',serif;color:#1a1a3e;margin:0">My Orders</h5>
                <span id="ordCount" style="font-size:12px;color:#adb5bd"></span>
            </div>

            <!-- Filter tabs -->
            <div class="ord-tabs" id="ordTabs">
                <button class="ord-tab active" onclick="filterOrders('all',this)">All</button>
                <button class="ord-tab" onclick="filterOrders('pending',this)">Pending</button>
                <button class="ord-tab" onclick="filterOrders('processing',this)">Processing</button>
                <button class="ord-tab" onclick="filterOrders('ready_for_pickup',this)">Ready for Pickup</button>
                <button class="ord-tab" onclick="filterOrders('in_transit',this)">In Transit</button>
                <button class="ord-tab" onclick="filterOrders('delivered',this)">Delivered</button>
                <button class="ord-tab" onclick="filterOrders('cancelled',this)">Cancelled</button>
            </div>

            <!-- Skeleton -->
            <div id="ordSkeleton">
                {% for _ in range(3) %}
                <div class="ord-card mb-3">
                    <div class="ord-header">
                        <div><div class="skel mb-1" style="height:14px;width:120px"></div><div class="skel" style="height:11px;width:80px"></div></div>
                        <div class="skel" style="height:22px;width:80px;border-radius:20px"></div>
                    </div>
                    <div class="ord-body">
                        <div class="skel mb-2" style="height:13px;width:90%"></div>
                        <div class="skel mb-2" style="height:13px;width:70%"></div>
                    </div>
                    <div class="ord-footer">
                        <div class="skel" style="height:15px;width:100px"></div>
                        <div class="skel" style="height:32px;width:90px;border-radius:8px"></div>
                    </div>
                </div>
                {% endfor %}
            </div>

            <!-- Orders list -->
            <div id="ordersList" style="display:none"></div>
        </div>
    </div>
</div>

<div class="shop-toast" id="shopToast"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script>
const CSRF = () => document.querySelector('meta[name="csrf-token"]')?.content || '';

async function updateCartBadge() {
    const res = await fetch('/buyer/api/cart').then(r => r.json()).catch(() => null);
    const items = (res && res.data && Array.isArray(res.data.items)) ? res.data.items
        : (res && Array.isArray(res.items)) ? res.items : [];
    const total = items.reduce((s, i) => s + Number(i.quantity || 0), 0);
    document.querySelectorAll('.cart-count').forEach(el => {
        el.textContent = total;
        el.style.display = total > 0 ? 'flex' : 'none';
    });
}

function showToast(msg, isError = false) {
    const t = document.getElementById('shopToast');
    if (!t) return;
    t.textContent = msg;
    t.style.background = isError ? '#c0392b' : '#1a1a3e';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

let allOrders = [];

async function initOrdersPage() {
    const raw = await API.buyer.getOrders().catch(() => null);
    allOrders = Array.isArray(raw) ? raw : (raw && raw.orders ? raw.orders : []);
    document.getElementById('ordSkeleton').style.display = 'none';
    document.getElementById('ordersList').style.display = 'block';
    renderOrders(allOrders);
}

function filterOrders(status, btn) {
    document.querySelectorAll('.ord-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = status === 'all' ? allOrders : allOrders.filter(o => o.status === status);
    renderOrders(filtered);
}

const STATUS_STEPS = ['pending','processing','ready_for_pickup','in_transit','delivered'];

function badgeClass(status) {
    return 'badge-' + (status || 'pending');
}

function progressHtml(status) {
    const idx = STATUS_STEPS.indexOf(status);
    if (idx === -1) return '';
    const labels = ['Pending','Processing','Ready','In Transit','Delivered'];
    return `<div class="ord-progress">
        <div class="ord-progress-track">
            ${STATUS_STEPS.map((s, i) => `
                <div class="ord-step ${i < idx ? 'done' : ''} ${i === idx ? 'active' : ''}">
                    <div class="ord-step-dot">${i < idx ? '✓' : i + 1}</div>
                    <div class="ord-step-label">${labels[i]}</div>
                </div>`).join('')}
        </div>
    </div>`;
}

function renderOrders(data) {
    const container = document.getElementById('ordersList');
    const countEl   = document.getElementById('ordCount');
    if (countEl) countEl.textContent = data.length + ' order' + (data.length !== 1 ? 's' : '');

    if (!data || !data.length) {
        container.innerHTML = `
            <div class="ord-empty">
                <div class="ord-empty-icon">📦</div>
                <h5>No orders found</h5>
                <p>Start shopping to see your orders here.</p>
                <a href="/buyer/market" style="background:linear-gradient(135deg,#FF2BAC,#FF6BCE);color:#fff;padding:10px 24px;border-radius:10px;text-decoration:none;font-size:14px;font-weight:600">Browse Products</a>
            </div>`;
        return;
    }

    container.innerHTML = data.map(o => {
        const orderId    = o.order_id || o.id || '';
        const total      = o.total_price ?? o.total ?? 0;
        const status     = o.status || 'pending';
        const orderItems = o.items || [];
        const createdAt  = o.created_at
            ? new Date(o.created_at).toLocaleDateString('en-PH', {year:'numeric',month:'short',day:'numeric'})
            : '—';

        const itemsHtml = orderItems.slice(0, 3).map(item => {
            const variant  = item.variant || {};
            const colorHex = variant.color_hex || '';
            return `<div class="ord-item-row">
                ${colorHex ? `<div class="ord-color-dot" style="background:${colorHex}"></div>` : '<div style="width:10px"></div>'}
                <span class="ord-item-name">${item.product_name || 'Product'}</span>
                <span class="ord-item-qty">×${item.quantity || 1}</span>
                <span class="ord-item-price">₱${Number(item.final_price || item.unit_price || 0).toLocaleString('en-PH',{minimumFractionDigits:2})}</span>
            </div>`;
        }).join('');

        const moreCount = orderItems.length - 3;

        return `
        <div class="ord-card">
            <div class="ord-header">
                <div>
                    <div class="ord-id">Order #${orderId.slice(0,8).toUpperCase()}</div>
                    <div class="ord-date">${createdAt} · ${o.payment_method ? o.payment_method.toUpperCase().replace('_',' ') : 'COD'}</div>
                </div>
                <span class="ord-badge ${badgeClass(status)}">${status.replace(/_/g,' ')}</span>
            </div>
            <div class="ord-body">
                ${itemsHtml}
                ${moreCount > 0 ? `<div style="font-size:11px;color:#adb5bd;padding:4px 0">+${moreCount} more item(s)</div>` : ''}
            </div>
            ${status !== 'cancelled' ? progressHtml(status) : ''}
            <div class="ord-footer">
                <div class="ord-total">Total: <span>₱${Number(total).toLocaleString('en-PH',{minimumFractionDigits:2})}</span></div>
                <div class="ord-actions">
                    ${status === 'pending' ? `<button class="ord-btn-cancel" onclick="cancelOrder('${orderId}')">Cancel</button>` : ''}
                    <a href="/buyer/order_summary?id=${orderId}" class="ord-btn-view">View Details</a>
                </div>
            </div>
        </div>`;
    }).join('');
}

async function cancelOrder(orderId) {
    if (!confirm('Cancel this order?')) return;
    const res = await fetch(`/buyer/api/orders/${orderId}/cancel`, {
        method: 'POST',
        headers: { 'X-CSRF-Token': CSRF() }
    }).then(r => r.json()).catch(() => ({ success: false }));
    if (res.success) { showToast('Order cancelled.'); initOrdersPage(); }
    else showToast(res.error || 'Failed to cancel.', true);
}

document.addEventListener('DOMContentLoaded', () => { initOrdersPage(); updateCartBadge(); });
</script>
</body>
</html>
