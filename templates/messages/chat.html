<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Messages — Grande</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/shop.css') }}">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 16px; width: 100%; }

        /* ── Layout ── */
        .chat-shell { 
            display: flex; 
            height: calc(100vh - 60px); 
            overflow: hidden; 
            margin-top: 60px;
            width: 100%;
        }

        /* ── Sidebar ── */
        .conv-sidebar {
            width: 30%; 
            min-width: 280px;
            flex-shrink: 0; 
            background: #fff;
            border-right: 1px solid #e8e8f0; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
        }
        .conv-header {
            padding: 16px; border-bottom: 1px solid #f0f0f0;
            display: flex; align-items: center; justify-content: space-between;
        }
        .conv-header h2 { font-size: 18px; font-weight: 700; color: #1a1a3e; }
        .conv-search {
            padding: 10px 16px; border-bottom: 1px solid #f0f0f0;
        }
        .conv-search input {
            width: 100%; padding: 8px 12px; border: 1px solid #e8e8f0;
            border-radius: 20px; font-size: 13px; outline: none;
            background: #f8f9fa;
        }
        .conv-list { flex: 1; overflow-y: auto; }
        .conv-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; cursor: pointer; transition: background .15s;
            border-bottom: 1px solid #f8f9fa;
        }
        .conv-item:hover { background: #f8f9fa; }
        .conv-item.active { background: #fff0f8; }
        .conv-avatar {
            width: 44px; height: 44px; border-radius: 50%;
            background: linear-gradient(135deg, #FF2BAC, #FF9ED6);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0; color: #fff; font-weight: 700;
            position: relative;
        }
        .conv-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .conv-unread-dot {
            position: absolute; bottom: 1px; right: 1px;
            width: 12px; height: 12px; background: #FF2BAC;
            border-radius: 50%; border: 2px solid #fff;
        }
        .conv-info { flex: 1; min-width: 0; }
        .conv-name { font-size: 14px; font-weight: 600; color: #1a1a3e; }
        .conv-preview { font-size: 12px; color: #6c757d; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
        .conv-meta { text-align: right; flex-shrink: 0; }
        .conv-time { font-size: 11px; color: #adb5bd; }
        .conv-badge {
            background: #FF2BAC; color: #fff; font-size: 10px; font-weight: 700;
            min-width: 18px; height: 18px; border-radius: 9px; padding: 0 4px;
            display: inline-flex; align-items: center; justify-content: center; margin-top: 4px;
        }
        .conv-empty { padding: 40px 16px; text-align: center; color: #adb5bd; font-size: 13px; }

        /* ── Chat window ── */
        .chat-window { flex: 1; display: flex; flex-direction: column; background: #f0f2f5; }
        .chat-empty-state {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: #adb5bd;
        }
        .chat-empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .chat-empty-state p { font-size: 14px; }

        .chat-topbar {
            background: #fff; padding: 12px 20px; border-bottom: 1px solid #e8e8f0;
            display: flex; align-items: center; gap: 12px;
        }
        .chat-topbar-avatar {
            width: 38px; height: 38px; border-radius: 50%;
            background: linear-gradient(135deg, #FF2BAC, #FF9ED6);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; color: #fff; font-weight: 700; flex-shrink: 0;
        }
        .chat-topbar-name { font-size: 15px; font-weight: 600; color: #1a1a3e; }
        .chat-topbar-role { font-size: 11px; color: #6c757d; text-transform: capitalize; }

        .chat-messages {
            flex: 1; 
            overflow-y: auto; 
            padding: 16px;
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .msg-row { 
            display: flex; 
            align-items: flex-end; 
            gap: 8px;
            margin-bottom: 4px;
        }
        .msg-row.sent { 
            flex-direction: row;
            justify-content: flex-end;
        }
        .msg-row.received { 
            flex-direction: row-reverse;
            justify-content: flex-start;
        }
        .msg-avatar {
            width: 28px; height: 28px; border-radius: 50%;
            background: linear-gradient(135deg, #FF2BAC, #FF9ED6);
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: #fff; font-weight: 700; flex-shrink: 0;
        }
        .msg-bubble {
            max-width: 70%; 
            padding: 12px 16px; 
            border-radius: 18px;
            font-size: 14px; 
            line-height: 1.5; 
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            position: relative;
            display: inline-block;
            text-align: left;
        }
        .msg-row.received .msg-bubble { 
            background: #fff; 
            color: #1a1a3e; 
            border-bottom-right-radius: 4px; 
            box-shadow: 0 2px 8px rgba(0,0,0,.08); 
            border: 1px solid #f0f0f0;
            text-align: left;
        }
        .msg-row.sent .msg-bubble { 
            background: linear-gradient(135deg, #FF2BAC, #FF6BCE); 
            color: #fff; 
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(255,43,172,.15);
            text-align: left;
        }
        .msg-time { 
            font-size: 11px; 
            color: #adb5bd; 
            margin-top: 4px; 
            text-align: left; 
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: flex-start;
        }
        .msg-row.received .msg-time { 
            text-align: right; 
            justify-content: flex-end;
        }
        .msg-sender-name {
            font-size: 12px;
            font-weight: 600;
            color: #6c757d;
            margin-bottom: 4px;
            display: block;
        }
        .msg-row.sent .msg-sender-name {
            display: none;
        }
        .msg-attachment { margin-top: 6px; }
        .msg-attachment img { 
            max-width: 200px; 
            border-radius: 12px; 
            cursor: pointer; 
            border: 1px solid #e8e8f0;
            transition: transform 0.2s;
        }
        .msg-attachment img:hover { transform: scale(1.02); }
        .msg-date-divider {
            text-align: center; 
            font-size: 12px; 
            color: #6c757d;
            margin: 16px 0; 
            position: relative;
            font-weight: 600;
        }
        .msg-date-divider::before, .msg-date-divider::after {
            content: ''; 
            position: absolute; 
            top: 50%; 
            width: 30%;
            height: 1px; 
            background: linear-gradient(90deg, transparent, #e8e8f0);
        }
        .msg-date-divider::before { 
            left: 0; 
            background: linear-gradient(90deg, #e8e8f0, transparent);
        }
        .msg-date-divider::after { 
            right: 0; 
            background: linear-gradient(90deg, transparent, #e8e8f0);
        }

        .chat-input-area {
            background: #fff; padding: 12px 16px; border-top: 1px solid #e8e8f0;
            display: flex; align-items: flex-end; gap: 10px;
        }
        .chat-input {
            flex: 1; 
            border: 2px solid #e8e8f0; 
            border-radius: 24px;
            padding: 12px 18px; 
            font-size: 14px; 
            outline: none; 
            resize: none;
            max-height: 120px; 
            font-family: inherit; 
            line-height: 1.5;
            transition: all .2s;
            background: #fff;
        }
        .chat-input:focus { 
            border-color: #FF2BAC; 
            box-shadow: 0 0 0 3px rgba(255,43,172,.1);
        }
        .chat-send-btn {
            width: 44px; 
            height: 44px; 
            border-radius: 50%;
            background: linear-gradient(135deg, #FF2BAC, #FF6BCE); 
            border: none; 
            cursor: pointer;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 18px; 
            flex-shrink: 0; 
            transition: all .2s;
            color: #fff;
            box-shadow: 0 2px 8px rgba(255,43,172,.2);
        }
        .chat-send-btn:hover { 
            background: linear-gradient(135deg, #e0259a, #FF2BAC); 
            transform: scale(1.05); 
            box-shadow: 0 4px 12px rgba(255,43,172,.3);
        }
        .chat-send-btn:disabled { 
            background: #e8e8f0; 
            cursor: not-allowed; 
            transform: none; 
            box-shadow: none;
            color: #adb5bd;
        }

        /* ── New chat button ── */
        .new-chat-btn {
            background: #FF2BAC; color: #fff; border: none; border-radius: 8px;
            padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
        }

        /* ── Role badge ── */
        .role-badge {
            font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600;
        }
        .role-buyer   { background: #e3f2fd; color: #1565c0; }
        .role-seller  { background: #f3e5f5; color: #6a1b9a; }
        .role-rider   { background: #e8f5e9; color: #2e7d32; }
        .role-admin   { background: #fff3e0; color: #e65100; }

        /* ── Back button (mobile) ── */
        .back-btn { display: none; background: none; border: none; font-size: 20px; cursor: pointer; }
        .back-to-site-btn { background: none; border: none; font-size: 14px; cursor: pointer; color: #6c757d; padding: 8px 12px; border-radius: 8px; transition: all .2s; display: flex; align-items: center; gap: 6px; }
        .back-to-site-btn:hover { background: #f8f9fa; color: #1a1a3e; }
        .toggle-sidebar-btn { display: none; background: none; border: none; font-size: 18px; cursor: pointer; color: #1a1a3e; padding: 8px; }

        /* ── Typing indicator ── */
        .typing-indicator { 
            font-size: 12px; 
            color: #6c757d; 
            padding: 0 20px 8px; 
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .typing-dots {
            display: flex;
            gap: 2px;
        }
        .typing-dots span {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #6c757d;
            animation: typing 1.4s infinite ease-in-out;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
            30% { transform: translateY(-4px); opacity: 1; }
        }
        
        /* Toast notifications */
        .shop-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1a3e;
            color: #fff;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 4px 20px rgba(0,0,0,.15);
            z-index: 9999;
            display: none;
            align-items: center;
            gap: 8px;
            max-width: 320px;
            animation: toastSlideIn 0.3s ease;
        }
        .shop-toast.error {
            background: #e74c3c;
        }
        .shop-toast.success {
            background: #10b981;
        }
        @keyframes toastSlideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes toastFadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,.4);
            display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: #fff; border-radius: 16px; padding: 24px;
            width: 360px; max-width: 90vw;
        }
        .modal-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #1a1a3e; }
        .modal-box input, .modal-box select {
            width: 100%; padding: 10px 12px; border: 1px solid #e8e8f0;
            border-radius: 8px; font-size: 14px; margin-bottom: 12px; outline: none;
        }
        .modal-box input:focus, .modal-box select:focus { border-color: #FF2BAC; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
        .btn-cancel { padding: 8px 16px; border: 1px solid #e8e8f0; border-radius: 8px; background: #fff; cursor: pointer; font-size: 13px; }
        .btn-start  { padding: 8px 16px; background: #FF2BAC; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }

        @media (max-width: 991px) {
            .conv-sidebar {
                width: 100%;
                position: absolute;
                left: 0;
                top: 60px;
                height: calc(100vh - 60px);
                z-index: 100;
                border-right: none;
                border-bottom: 1px solid #e8e8f0;
            }
            .conv-sidebar.hidden {
                display: none;
            }
            .chat-window {
                width: 100%;
            }
            .back-btn {
                display: block;
            }
            .msg-bubble {
                max-width: 80%;
            }
        }
        
        @media (max-width: 768px) {
            .chat-shell {
                height: calc(100vh - 60px);
                margin-top: 60px;
            }
            .conv-sidebar {
                width: 100%;
                position: absolute;
                left: 0;
                top: 60px;
                height: calc(100vh - 60px);
                z-index: 100;
            }
            .conv-header {
                padding: 12px 14px;
            }
            .conv-header h2 {
                font-size: 16px;
            }
            .conv-item {
                padding: 10px 12px;
            }
            .conv-avatar {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
            .conv-name {
                font-size: 13px;
            }
            .conv-preview {
                font-size: 11px;
            }
            .chat-topbar {
                padding: 10px 14px;
            }
            .chat-topbar-avatar {
                width: 34px;
                height: 34px;
                font-size: 14px;
            }
            .chat-topbar-name {
                font-size: 14px;
            }
            .chat-messages {
                padding: 12px;
                gap: 8px;
            }
            .msg-bubble {
                max-width: 80%;
                padding: 10px 14px;
                font-size: 13px;
            }
            .msg-avatar {
                width: 24px;
                height: 24px;
                font-size: 10px;
            }
            .msg-time {
                font-size: 10px;
            }
            .msg-sender-name {
                font-size: 11px;
            }
            .chat-input-area {
                padding: 10px 12px;
                gap: 8px;
            }
            .chat-input {
                padding: 10px 14px;
                font-size: 13px;
            }
            .chat-send-btn {

                height: 40px;
                font-size: 16px;
            }
        }
        
        @media (max-width: 480px) {
            .chat-shell {
                height: calc(100vh - 60px);
                margin-top: 60px;
            }
            .conv-sidebar {
                width: 100%;
                position: absolute;
                left: 0;
                top: 60px;
                height: calc(100vh - 60px);
                z-index: 100;
            }
            .conv-header {
                padding: 10px 12px;
            }
            .conv-header h2 {
                font-size: 14px;
            }
            .new-chat-btn {
                padding: 4px 10px;
                font-size: 11px;
            }
            .conv-search input {
                padding: 6px 10px;
                font-size: 12px;
            }
            .conv-item {
                padding: 8px 10px;
                gap: 8px;
            }
            .conv-avatar {
                width: 36px;
                height: 36px;
                font-size: 14px;
            }
            .conv-name {
                font-size: 12px;
            }
            .conv-preview {
                font-size: 10px;
            }
            .conv-time {
                font-size: 10px;
            }
            .chat-topbar {
                padding: 8px 12px;
                gap: 8px;
            }
            .back-btn {
                font-size: 18px;
                padding: 4px 8px;
            }
            .chat-topbar-avatar {
                width: 32px;
                height: 32px;
                font-size: 12px;
            }
            .chat-topbar-name {
                font-size: 13px;
            }
            .chat-topbar-role {
                font-size: 10px;
            }
            .chat-messages {
                padding: 8px;
                gap: 6px;
            }
            .msg-bubble {
                max-width: 85%;
                padding: 8px 12px;
                font-size: 12px;
                line-height: 1.4;
            }
            .msg-avatar {
                width: 20px;
                height: 20px;
                font-size: 8px;
            }
            .msg-time {
                font-size: 9px;
            }
            .msg-sender-name {
                font-size: 10px;
            }
            .msg-date-divider {
                font-size: 11px;
                margin: 12px 0;
            }
            .chat-input-area {
                padding: 8px 10px;
                gap: 6px;
            }
            .chat-input {
                padding: 8px 12px;
                font-size: 12px;
                border-radius: 20px;
            }

                width: 38px;

        @media (max-width: 320px) {
            .msg-bubble {

            }
            .chat-topbar-name {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

{% from 'buyer/_navbar.html' import grande_navbar %}
{{ grande_navbar(user=session.get('user'), active='') }}

<div class="container">
<div class="chat-shell">

    <!-- Conversation Sidebar -->
    <div class="conv-sidebar" id="convSidebar">
        <div class="conv-header">
            <button class="back-to-site-btn" onclick="window.location.href='/buyer/market'" title="Back to Shop">← Back</button>
            <h2 style="flex:1">💬 Messages</h2>
            <button class="new-chat-btn" onclick="openNewChat()">+ New</button>
        </div>
        <div class="conv-search">
            <input type="text" id="convSearch" placeholder="Search conversations…" oninput="filterConversations()">
        </div>
        <div class="conv-list" id="convList">
            <div class="conv-empty">Loading…</div>
        </div>
    </div>

    <!-- Chat Window -->
    <div class="chat-window" id="chatWindow">
        <div class="chat-empty-state" id="chatEmptyState">
            <div class="icon">💬</div>
            <p>Select a conversation to start chatting</p>
        </div>

        <div id="chatActive" style="display:none; flex-direction:column; height:100%;">
            <div class="chat-topbar">
                <button class="toggle-sidebar-btn" id="toggleSidebarBtn" onclick="toggleSidebar()" title="Show conversations">☰</button>
                <button class="back-btn" onclick="showSidebar()">←</button>
                <div class="chat-topbar-avatar" id="chatTopAvatar">?</div>
                <div>
                    <div class="chat-topbar-name" id="chatTopName">—</div>
                    <div class="chat-topbar-role" id="chatTopRole">—</div>
                </div>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="typing-indicator" id="typingIndicator" style="display:none">
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
                Typing…
            </div>
            <div class="chat-input-area">
                <textarea class="chat-input" id="chatInput" rows="1" placeholder="Type a message…"
                    onkeydown="handleInputKey(event)" oninput="autoResize(this)"></textarea>
                <button class="chat-send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>
</div>
</div>

<div class="shop-toast" id="shopToast"></div>

<!-- New Chat Modal -->
<div class="modal-overlay" id="newChatModal">
    <div class="modal-box">
        <h3>Start New Conversation</h3>
        <input type="text" id="newChatUserId" placeholder="User ID (paste from order/profile)">
        <input type="text" id="newChatOrderId" placeholder="Order ID (optional)">
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeNewChat()">Cancel</button>
            <button class="btn-start" onclick="startNewChat()">Start Chat</button>
        </div>
    </div>
</div>

<script>
const ME = {{ session.user | tojson | safe }} || null;
let activeConvId = null;
let allConversations = [];
let pollTimer = null;
let lastMsgId = null;

// ── Init ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    loadConversations();
    // Check URL for ?conv=id
    const params = new URLSearchParams(location.search);
    if (params.get('conv')) openConversation(params.get('conv'));
    if (params.get('user')) startChatWithUser(params.get('user'), params.get('order'));
});

// ── Conversations ─────────────────────────────────────────────
async function loadConversations() {
    const list = document.getElementById('convList');
    if (list) {
        list.innerHTML = '<div class="conv-empty">Loading conversations…</div>';
    }
    
    try {
        const res = await fetch('/messages/api/conversations');
        if (!res.ok) {
            throw new Error('Failed to load conversations');
        }
        const data = await res.json();
        allConversations = Array.isArray(data) ? data : [];
        
        // Fetch store names for sellers
        for (const conv of allConversations) {
            const other = conv.other_user || conv.other || {};
            if (other.role === 'seller') {
                // Fetch seller's store name from applications table
                try {
                    const storeRes = await fetch(`/api/seller/${other.id}/store-name`).then(r => r.json()).catch(() => null);
                    if (storeRes && storeRes.store_name) {
                        other.store_name = storeRes.store_name;
                    }
                } catch (e) {
                    console.error('Failed to fetch store name:', e);
                }
            }
        }
        
        renderConversations(allConversations);
    } catch (error) {
        console.error('Error loading conversations:', error);
        if (list) {
            list.innerHTML = '<div class="conv-empty">Failed to load conversations.<br><button onclick="loadConversations()" style="margin-top:8px;padding:6px 12px;background:#FF2BAC;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px">Retry</button></div>';
        }
        showToast('Failed to load conversations', true);
    }
}

function renderConversations(convs) {
    const list = document.getElementById('convList');
    if (!convs.length) {
        list.innerHTML = '<div class="conv-empty">No conversations yet.<br>Click "+ New" to start one.</div>';
        return;
    }
    list.innerHTML = convs.map(c => {
        const other = c.other_user || c.other || {};
        let displayName = `${other.first_name || ''} ${other.last_name || ''}`.trim() || 'Unknown';
        
        // Show store name for sellers, full name for buyers
        if (other.role === 'seller' && other.store_name) {
            displayName = other.store_name;
        }
        
        const initial = displayName[0]?.toUpperCase() || '?';
        const role = other.role || '';
        const unread = c.unread_count || 0;
        const time = c.updated_at ? timeAgo(c.updated_at) : '';
        return `
        <div class="conv-item ${c.id === activeConvId ? 'active' : ''}" onclick="openConversation('${c.id}')">
            <div class="conv-avatar">
                ${other.profile_picture ? `<img src="${other.profile_picture}" alt="${displayName}">` : initial}
                ${unread > 0 ? '<div class="conv-unread-dot"></div>' : ''}
            </div>
            <div class="conv-info">
                <div class="conv-name">${displayName} <span class="role-badge role-${role}">${role}</span></div>
                <div class="conv-preview">${c.last_message || 'No messages yet'}</div>
            </div>
            <div class="conv-meta">
                <div class="conv-time">${time}</div>
                ${unread > 0 ? `<div class="conv-badge">${unread}</div>` : ''}
            </div>
        </div>`;
    }).join('');
}

function filterConversations() {
    const q = document.getElementById('convSearch').value.toLowerCase();
    if (!q) { renderConversations(allConversations); return; }
    const filtered = allConversations.filter(c => {
        const other = c.other || c.p1 || {};
        const name = `${other.first_name || ''} ${other.last_name || ''}`.toLowerCase();
        return name.includes(q) || (c.last_message || '').toLowerCase().includes(q);
    });
    renderConversations(filtered);
}

// ── Open conversation ─────────────────────────────────────────
async function openConversation(convId) {
    activeConvId = convId;
    clearInterval(pollTimer);
    lastMsgId = null;

    // Update sidebar active state
    document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
    const selector = `.conv-item[onclick*="openConversation('${convId}')"]`;
    const activeItem = document.querySelector(selector);
    if (activeItem) activeItem.classList.add('active');

    // Find conversation data
    const conv = allConversations.find(c => c.id === convId);
    const other = conv ? (conv.other_user || conv.other || {}) : {};
    
    // Determine display name based on role
    let displayName = `${other.first_name || ''} ${other.last_name || ''}`.trim() || 'User';
    if (other.role === 'seller' && other.store_name) {
        displayName = other.store_name;
    }

    // Update topbar
    document.getElementById('chatTopAvatar').textContent = displayName[0]?.toUpperCase() || '?';
    document.getElementById('chatTopName').textContent = displayName;
    document.getElementById('chatTopRole').innerHTML = `<span class="role-badge role-${other.role || ''}">${other.role || ''}</span>`;

    // Show chat area
    document.getElementById('chatEmptyState').style.display = 'none';
    const chatActive = document.getElementById('chatActive');
    chatActive.style.display = 'flex';

    // Mobile: hide sidebar
    if (window.innerWidth < 992) {
        document.getElementById('convSidebar').classList.add('hidden');
    }

    // Load messages
    await loadMessages(convId);

    // Start polling every 3 seconds
    pollTimer = setInterval(() => pollMessages(convId), 3000);

    // Update URL
    history.replaceState(null, '', `/messages/?conv=${convId}`);
}

async function loadMessages(convId) {
    const container = document.getElementById('chatMessages');
    if (container) {
        container.innerHTML = '<div style="text-align:center;padding:40px;color:#adb5bd;font-size:13px">Loading messages…</div>';
    }
    
    try {
        const res = await fetch(`/messages/api/conversations/${convId}/messages`);
        if (!res.ok) {
            throw new Error('Failed to load messages');
        }
        const msgs = await res.json();
        renderMessages(msgs);
        if (msgs.length) lastMsgId = msgs[msgs.length - 1].id;
        scrollToBottom();
        // Refresh sidebar unread counts
        loadConversations();
    } catch (error) {
        console.error('Error loading messages:', error);
        if (container) {
            container.innerHTML = '<div style="text-align:center;padding:40px;color:#e74c3c;font-size:13px">Failed to load messages.<br><button onclick="loadMessages(\'' + convId + '\')" style="margin-top:8px;padding:6px 12px;background:#FF2BAC;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px">Retry</button></div>';
        }
        showToast('Failed to load messages', true);
    }
}

async function pollMessages(convId) {
    if (!lastMsgId) return;
    const msgs = await fetch(`/messages/api/conversations/${convId}/messages?after=${lastMsgId}`).then(r => r.json()).catch(() => []);
    if (msgs.length) {
        appendMessages(msgs);
        lastMsgId = msgs[msgs.length - 1].id;
        scrollToBottom();
        loadConversations();
    }
}

function renderMessages(msgs) {
    const container = document.getElementById('chatMessages');
    container.innerHTML = '';
    let lastDate = null;
    msgs.forEach(m => {
        const d = new Date(m.created_at).toDateString();
        if (d !== lastDate) {
            const div = document.createElement('div');
            div.className = 'msg-date-divider';
            div.textContent = d === new Date().toDateString() ? 'Today' : d;
            container.appendChild(div);
            lastDate = d;
        }
        container.appendChild(buildMsgEl(m));
    });
}

function appendMessages(msgs) {
    const container = document.getElementById('chatMessages');
    msgs.forEach(m => container.appendChild(buildMsgEl(m)));
}

function buildMsgEl(m) {
    const isSent = m.sender_id === ME.id;
    const sender = m.sender || {};
    const senderName = `${sender.first_name || ''} ${sender.last_name || ''}`.trim() || 'User';
    const initial = senderName[0]?.toUpperCase() || '?';
    const row = document.createElement('div');
    row.className = `msg-row ${isSent ? 'sent' : 'received'}`;
    row.innerHTML = `
        ${isSent ? `<div class="msg-avatar" title="You">${ME.first_name?.[0]?.toUpperCase() || 'Y'}</div>` : ''}
        <div style="flex:1">
            ${isSent ? `<div class="msg-sender-name">You</div>` : `<div class="msg-sender-name">${senderName}</div>`}
            <div class="msg-bubble">
                ${escHtml(m.content)}
                ${m.attachment_url ? `<div class="msg-attachment"><img src="${m.attachment_url}" onclick="window.open(this.src)"></div>` : ''}
            </div>
            <div class="msg-time">
                ${formatTime(m.created_at)}
                ${isSent ? (m.is_read ? '<span style="color:#10b981">✓✓</span>' : '<span style="color:#adb5bd">✓</span>') : ''}
            </div>
        </div>
        ${!isSent ? `<div class="msg-avatar" title="${senderName}">${initial}</div>` : ''}
    `;
    return row;
}

// ── Send message ──────────────────────────────────────────────
async function sendMessage() {
    if (!activeConvId) return;
    const input = document.getElementById('chatInput');
    const content = input.value.trim();
    if (!content) {
        showToast('Message cannot be empty', true);
        return;
    }

    input.value = '';
    autoResize(input);
    document.getElementById('sendBtn').disabled = true;

    try {
        const res = await fetch(`/messages/api/conversations/${activeConvId}/messages`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken() },
            body: JSON.stringify({ content })
        });
        
        if (!res.ok) {
            const error = await res.json().catch(() => ({ error: 'Failed to send message' }));
            throw new Error(error.error || 'Failed to send message');
        }
        
        const data = await res.json();
        if (data && data.id) {
            appendMessages([data]);
            lastMsgId = data.id;
            scrollToBottom();
            loadConversations();
            showToast('Message sent');
        }
    } catch (error) {
        showToast(error.message || 'Failed to send message', true);
        // Restore message if failed
        input.value = content;
        autoResize(input);
    } finally {
        document.getElementById('sendBtn').disabled = false;
    }
}

function handleInputKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── New chat modal ────────────────────────────────────────────
function openNewChat() { document.getElementById('newChatModal').classList.add('open'); }
function closeNewChat() { document.getElementById('newChatModal').classList.remove('open'); }

async function startNewChat() {
    const userId = document.getElementById('newChatUserId').value.trim();
    const orderId = document.getElementById('newChatOrderId').value.trim();
    if (!userId) return;
    const res = await fetch('/messages/api/conversations/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken() },
        body: JSON.stringify({ user_id: userId, order_id: orderId || null })
    }).then(r => r.json()).catch(() => null);
    closeNewChat();
    if (res && res.id) { await loadConversations(); openConversation(res.id); }
}

async function startChatWithUser(userId, orderId) {
    const res = await fetch('/messages/api/conversations/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken() },
        body: JSON.stringify({ user_id: userId, order_id: orderId || null })
    }).then(r => r.json()).catch(() => null);
    if (res && res.id) { await loadConversations(); openConversation(res.id); }
}

// ── Mobile ────────────────────────────────────────────────────
function toggleSidebar() {
    const sidebar = document.getElementById('convSidebar');
    sidebar.classList.toggle('hidden');
}

function showSidebar() {
    document.getElementById('convSidebar').classList.remove('hidden');
}

// ── Toast notifications ──────────────────────────────────────
function showToast(message, isError = false) {
    const toast = document.getElementById('shopToast');
    if (!toast) return;
    
    toast.textContent = message;
    toast.className = 'shop-toast' + (isError ? ' error' : ' success');
    toast.style.display = 'flex';
    
    // Auto-hide after 3 seconds
    setTimeout(() => {
        toast.style.animation = 'toastFadeOut 0.3s ease';
        setTimeout(() => {
            toast.style.display = 'none';
            toast.style.animation = '';
        }, 300);
    }, 3000);
}

// ── Helpers ───────────────────────────────────────────────────
function scrollToBottom() {
    const el = document.getElementById('chatMessages');
    if (el) {
        el.scrollTop = el.scrollHeight;
    }
}

function csrfToken() {
    return document.querySelector('meta[name="csrf-token"]')?.content || '';
}

function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const now = new Date();
    const diffMs = now - d;
    const diffMins = Math.floor(diffMs / 60000);
    
    if (diffMins < 1) return 'Just now';
    if (diffMins < 60) return `${diffMins}m ago`;
    
    // Today: show time only
    if (d.toDateString() === now.toDateString()) {
        return d.toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit' });
    }
    
    // Yesterday
    const yesterday = new Date(now);
    yesterday.setDate(yesterday.getDate() - 1);
    if (d.toDateString() === yesterday.toDateString()) {
        return `Yesterday ${d.toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit' })}`;
    }
    
    // This week
    const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
    if (diffDays < 7) {
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        return `${days[d.getDay()]} ${d.toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit' })}`;
    }
    
    // Older
    return d.toLocaleDateString('en-PH', { month: 'short', day: 'numeric' }) + ' ' + 
           d.toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit' });
}

function timeAgo(iso) {
    if (!iso) return '';
    const diff = Date.now() - new Date(iso);
    const m = Math.floor(diff / 60000);
    if (m < 1) return 'now';
    if (m < 60) return m + 'm ago';
    if (m < 1440) return Math.floor(m / 60) + 'h ago';
    
    const d = Math.floor(m / 1440);
    if (d < 7) return d + 'd ago';
    
    const date = new Date(iso);
    return date.toLocaleDateString('en-PH', { month: 'short', day: 'numeric' });
}
