<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grande Seller — Edit Product</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/seller.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/product-form.css') }}">
</head>
<body>

<div id="sidebarOverlay"></div>
<button class="sidebar-toggle" id="sidebarToggle">&#9776;</button>

<aside class="sidebar">
    <div class="sidebar-logo">Grande Seller</div>
    <ul class="sidebar-menu">
        <li><a href="/seller"><span class="icon">🏠</span> Dashboard</a></li>
        <li class="menu-group">STORE</li>
        <li><a href="/seller/products" class="active"><span class="icon">📦</span> Products</a></li>
        <li><a href="/seller/orders"><span class="icon">🛒</span> Orders</a></li>
        <li><a href="/seller/shipping"><span class="icon">🚚</span> Shipping</a></li>
        <li class="menu-group">FINANCE</li>
        <li><a href="/seller/earnings"><span class="icon">💰</span> Earnings</a></li>
        <li class="menu-group">PROFILE</li>
        <li><a href="/seller/store"><span class="icon">🏬</span> Store Profile</a></li>
        <li><a href="/seller/reviews"><span class="icon">⭐</span> Reviews</a></li>
    </ul>
    <div class="sidebar-footer">
        <div class="sidebar-user">🏪 {{ session.user.name }}</div>
        <a href="/logout" class="logout-link">🚪 Logout</a>
    </div>
</aside>

<div class="main">
    <div class="topbar">
        <div class="topbar-title">Edit Product</div>
        <div class="topbar-right">Seller Panel</div>
    </div>
    <div class="content" style="padding:20px">

        <div class="pf-alert pf-alert-error" id="pfError" style="display:none"></div>
        <div class="pf-alert" id="pfSuccess" style="display:none;background:#d4edda;color:#155724;border:1px solid #c3e6cb;padding:12px 16px;border-radius:8px;margin-bottom:16px"></div>

        <div class="pf-card" id="editForm">
            <div class="pf-card-title">📝 Basic Information</div>

            <div class="pf-field">
                <label class="pf-label">Product Name <span class="pf-req">*</span></label>
                <input type="text" id="pfName" class="pf-input" placeholder="e.g. Floral Wrap Dress">
            </div>

            <div class="pf-field">
                <label class="pf-label">Description</label>
                <textarea id="pfDesc" class="pf-input pf-textarea" placeholder="Describe your product..."></textarea>
            </div>

            <div class="pf-field">
                <label class="pf-label">Category</label>
                <input type="text" id="pfCategory" class="pf-input" readonly
                       style="background:#f8f9fa;cursor:not-allowed;color:#666">
            </div>

            <!-- Variants -->
            <div class="pf-card-title" style="margin-top:24px">🎨 Variants</div>
            <p class="pf-sub">Update price and stock for each variant.</p>
            <div id="pfVariantList"></div>

            <div class="pf-actions">
                <a href="/seller/products" class="pf-btn pf-btn-ghost">Cancel</a>
                <button type="button" class="pf-btn pf-btn-primary" id="pfSaveBtn" onclick="saveEdit()">💾 Save Changes</button>
            </div>
        </div>

    </div>
</div>

<div class="toast" id="toast"></div>
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script>
const PRODUCT_ID = "{{ product_id }}";

async function loadProduct() {
    const res = await fetch(`/seller/api/products/${PRODUCT_ID}`).then(r => r.json()).catch(() => null);
    if (!res) { showError('Failed to load product.'); return; }

    document.getElementById('pfName').value     = res.name || '';
    document.getElementById('pfDesc').value     = res.description || '';
    document.getElementById('pfCategory').value = res.category || '';

    const variants = res.product_variants || [];
    const list = document.getElementById('pfVariantList');

    if (!variants.length) {
        list.innerHTML = '<p style="color:#999;font-size:13px">No variants found.</p>';
        return;
    }

    list.innerHTML = variants.map(v => {
        const hex = extractHex(v.sku) || '#808080';
        return `
        <div class="pf-variant-row" style="margin-bottom:12px">
            <div class="pf-var-preview">
                <div class="pf-var-color-preview" style="background:${hex}"></div>
                <div class="pf-var-size-label">${v.value || ''}</div>
            </div>
            <div class="pf-var-fields">
                <div class="pf-var-field">
                    <label class="pf-label-sm">Variant</label>
                    <input class="pf-input-sm" type="text" value="${v.value || ''}" readonly
                           style="background:#f8f9fa;cursor:not-allowed;color:#666">
                </div>
                <div class="pf-var-field">
                    <label class="pf-label-sm">Price (₱) <span class="pf-req">*</span></label>
                    <input class="pf-input-sm" type="number" min="0.01" step="0.01"
                           id="price_${v.id}" value="${parseFloat(v.price || 0).toFixed(2)}">
                </div>
                <div class="pf-var-field">
                    <label class="pf-label-sm">Stock</label>
                    <input class="pf-input-sm" type="number" min="0"
                           id="stock_${v.id}" value="${parseInt(v.stock || 0)}">
                </div>
            </div>
        </div>`;
    }).join('');

    // store variant ids for save
    window._variantIds = variants.map(v => v.id);
}

function extractHex(sku) {
    if (!sku) return null;
    const parts = sku.split('-');
    const hex = parts[parts.length - 1];
    return /^[0-9a-fA-F]{6}$/.test(hex) ? '#' + hex : null;
}

async function saveEdit() {
    const name = document.getElementById('pfName').value.trim();
    if (!name) { showError('Product name is required.'); return; }

    const btn = document.getElementById('pfSaveBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Saving...';

    const fd = new FormData();
    fd.append('name', name);
    fd.append('description', document.getElementById('pfDesc').value.trim());

    // Validate and append variant updates
    for (const vid of (window._variantIds || [])) {
        const price = parseFloat(document.getElementById(`price_${vid}`)?.value || 0);
        const stock = parseInt(document.getElementById(`stock_${vid}`)?.value || 0);
        if (price <= 0) { showError('All variant prices must be greater than 0.'); btn.disabled = false; btn.textContent = '💾 Save Changes'; return; }
        fd.append(`variant_${vid}_price`, price);
        fd.append(`variant_${vid}_stock`, stock);
    }

    const res = await fetch(`/seller/api/products/${PRODUCT_ID}`, {
        method: 'PUT', body: fd
    }).then(r => r.json()).catch(() => ({ error: 'Network error.' }));

    if (res.success) {
        document.getElementById('pfSuccess').textContent = '✅ Product updated successfully!';
        document.getElementById('pfSuccess').style.display = 'block';
        document.getElementById('pfError').style.display = 'none';
        setTimeout(() => window.location.href = '/seller/products', 1500);
    } else {
        showError(res.error || 'Failed to save changes.');
        btn.disabled = false;
        btn.textContent = '💾 Save Changes';
    }
}

function showError(msg) {
    const el = document.getElementById('pfError');
    el.textContent = msg;
    el.style.display = 'block';
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// Sidebar toggle
document.addEventListener('DOMContentLoaded', () => {
    loadProduct();
    const toggle  = document.getElementById('sidebarToggle');
    const sidebar = document.querySelector('.sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    if (toggle && sidebar) {
        toggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            if (overlay) overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
        });
    }
    if (overlay) overlay.addEventListener('click', () => { sidebar?.classList.remove('open'); overlay.style.display = 'none'; });
});
</script>
</body>
</html>
