<!-- Admin Support Chat Widget -->
<!-- Add this snippet to buyer, seller, and rider dashboard templates -->
<div class="admin-support-widget" style="position:fixed;bottom:20px;right:20px;z-index:1000">
    <button onclick="startAdminChat()" 
        style="
            width:56px;height:56px;border-radius:50%;
            background:linear-gradient(135deg,#FF2BAC,#FF6BCE);
            border:none;color:#fff;font-size:24px;
            box-shadow:0 4px 12px rgba(255,43,172,.3);
            cursor:pointer;transition:transform .2s;
            display:flex;align-items:center;justify-content:center;
        " 
        onmouseover="this.style.transform='scale(1.1)'" 
        onmouseout="this.style.transform='scale(1)'"
        title="Chat with Admin Support">
        💬
    </button>
</div>

<script>
async function startAdminChat() {
    // Find admin user - you can either:
    // 1. Hardcode admin ID here
    // 2. Fetch from API endpoint
    // 3. Store in environment/config
    
    // Option 1: Hardcode (replace with actual admin user ID)
    const adminId = 'ADMIN_USER_ID_HERE'; // TODO: Replace with actual admin ID
    
    // Option 2: Fetch from API (recommended)
    /*
    try {
        const adminRes = await fetch('/api/admin-user-id').then(r => r.json());
        const adminId = adminRes.admin_id;
    } catch (e) {
        alert('Unable to connect to admin support. Please try again later.');
        return;
    }
    */
    
    try {
        const res = await fetch('/messages/api/conversations/start', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRF-Token': document.querySelector('meta[name="csrf-token"]')?.content || ''
            },
            body: JSON.stringify({ user_id: adminId })
        }).then(r => r.json());
        
        if (res && res.id) {
            window.location.href = `/messages/?conv=${res.id}`;
        } else {
            alert('Failed to start chat with admin. Please try again.');
        }
    } catch (e) {
        console.error('Failed to start admin chat:', e);
        alert('Network error. Please try again.');
    }
}
</script>
